name: Assemble IERS 0012U v2

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/assemble_iers_0012u_v2.yml

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate corrected label-layout source
        shell: bash
        run: |
          python - <<'PYCODE'
          from pathlib import Path
          import py_compile
          import re

          source = Path("IERS_0012T_JPL_2004_NASA_FIGURE2_RECONSTRUCTION_FIXED_MAXIMUM.py")
          target = Path("IERS_0012U_JPL_2004_NASA_FIGURE2_RECONSTRUCTION_LABEL_LAYOUT.py")
          text = source.read_text(encoding="utf-8")

          text = text.replace(
              "# Audit reference: GitHubDelivery@IERS-0012T; corrected JPL geocentric reconstruction using centered-seconds greatest-transit minimization.",
              "# Audit reference: GitHubDelivery@IERS-0012U; preserve IERS-0012T JPL geometry and separate hourly/contact labels from the transit track.",
          )
          text = text.replace(
              "IERS_0012T_JPL_2004_NASA_FIGURE2_RECONSTRUCTION_FIXED_MAXIMUM.py",
              "IERS_0012U_JPL_2004_NASA_FIGURE2_RECONSTRUCTION_LABEL_LAYOUT.py",
          )
          text = text.replace("IERS-0012T", "IERS-0012U")

          text = text.replace(
              "    for hour, state in hourly.items():\n        center = (state[\"west_arcsec\"], state[\"north_arcsec\"])\n",
              "    hourly_label_offsets = {\n"
              "        5: -72.0,\n"
              "        6: 48.0,\n"
              "        7: 48.0,\n"
              "        8: -52.0,\n"
              "        9: -58.0,\n"
              "        10: -58.0,\n"
              "        11: -62.0,\n"
              "        12: -62.0,\n"
              "    }\n"
              "    for hour, state in hourly.items():\n"
              "        center = (state[\"west_arcsec\"], state[\"north_arcsec\"])\n",
          )
          text = text.replace(
              "        offset_y = 42.0 if hour <= 8 else -42.0",
              "        offset_y = hourly_label_offsets[hour]",
          )

          text, count = re.subn(
              r"    label_offsets = \{\n"
              r"        \"C1\": \([^\n]+\),\n"
              r"        \"C2\": \([^\n]+\),\n"
              r"        \"MAX\": \([^\n]+\),\n"
              r"        \"C3\": \([^\n]+\),\n"
              r"        \"C4\": \([^\n]+\),\n"
              r"    \}",
              "    label_offsets = {\n"
              "        \"C1\": (18.0, 122.0),\n"
              "        \"C2\": (68.0, 66.0),\n"
              "        \"MAX\": (58.0, 122.0),\n"
              "        \"C3\": (-62.0, 86.0),\n"
              "        \"C4\": (48.0, 112.0),\n"
              "    }",
              text,
              count=1,
          )
          if count != 1:
              raise RuntimeError(f"label_offsets replacement count = {count}")

          text = text.replace(
              "            ha=\"center\",\n"
              "            va=\"center\",\n"
              "            arrowprops={\n"
              "                \"arrowstyle\": \"-\",\n"
              "                \"linewidth\": 0.22,\n"
              "                \"color\": event_colors[key],\n"
              "            },\n",
              "            ha=\"right\" if dx < 0.0 else \"left\",\n"
              "            va=\"bottom\" if dy > 0.0 else \"top\",\n"
              "            bbox={\n"
              "                \"boxstyle\": \"round,pad=0.18\",\n"
              "                \"facecolor\": \"#03080d\",\n"
              "                \"edgecolor\": \"none\",\n"
              "                \"alpha\": 0.92,\n"
              "            },\n"
              "            arrowprops={\n"
              "                \"arrowstyle\": \"-\",\n"
              "                \"linewidth\": 0.22,\n"
              "                \"color\": event_colors[key],\n"
              "                \"shrinkA\": 2.0,\n"
              "                \"shrinkB\": 4.0,\n"
              "            },\n",
          )

          text = text.replace(
              '    print("No AI image generation is used.")',
              '    print("Contact and greatest-transit labels use separated up/down offsets with leader lines and dark backing boxes.")\n'
              '    print("Hourly labels alternate above and below the track to avoid contact-label collisions.")\n'
              '    print("No AI image generation is used.")',
          )

          target.write_text(text, encoding="utf-8")
          py_compile.compile(str(target), doraise=True)

          lines = text.splitlines()
          if lines[0] != "# IERS-0012U" or lines[-1] != "# IERS-0012U":
              raise RuntimeError("Version boundary audit failed.")
          if "offset_y = hourly_label_offsets[hour]" not in text:
              raise RuntimeError("Hourly label offset patch missing.")
          if '"MAX": (58.0, 122.0)' not in text:
              raise RuntimeError("Greatest-transit label patch missing.")
          if 'ha="right" if dx < 0.0 else "left"' not in text:
              raise RuntimeError("Annotation alignment patch missing.")
          print(f"Created {target}; lines={len(lines)}; compile=PASS")
          PYCODE

      - name: Commit generated source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add IERS_0012U_JPL_2004_NASA_FIGURE2_RECONSTRUCTION_LABEL_LAYOUT.py
          git commit -m "Add IERS 0012U separated plot label layout"
          git push
