name: Assemble IERS 0012U

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/assemble_iers_0012u.yml

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and compile-check IERS 0012U
        shell: bash
        run: |
          python - <<'PYCODE'
          from pathlib import Path
          import py_compile

          source = Path("IERS_0012T_JPL_2004_NASA_FIGURE2_RECONSTRUCTION_FIXED_MAXIMUM.py")
          target = Path("IERS_0012U_JPL_2004_NASA_FIGURE2_RECONSTRUCTION_LABEL_LAYOUT.py")
          text = source.read_text(encoding="utf-8")

          old_audit = "# Audit reference: GitHubDelivery@IERS-0012T; corrected JPL geocentric reconstruction using centered-seconds greatest-transit minimization."
          new_audit = "# Audit reference: GitHubDelivery@IERS-0012U; preserve IERS-0012T JPL geometry and separate hourly/contact labels from the transit track."
          assert text.count(old_audit) == 1
          text = text.replace(old_audit, new_audit)

          old_program = "IERS_0012T_JPL_2004_NASA_FIGURE2_RECONSTRUCTION_FIXED_MAXIMUM.py"
          new_program = "IERS_0012U_JPL_2004_NASA_FIGURE2_RECONSTRUCTION_LABEL_LAYOUT.py"
          assert text.count(old_program) == 1
          text = text.replace(old_program, new_program)
          text = text.replace("IERS-0012T", "IERS-0012U")

          old_loop = """    for hour, state in hourly.items():
        center = (state[\"west_arcsec\"], state[\"north_arcsec\"])
"""
          new_loop = """    hourly_label_offsets = {
        5: -72.0,
        6: 48.0,
        7: 48.0,
        8: -52.0,
        9: -58.0,
        10: -58.0,
        11: -62.0,
        12: -62.0,
    }
    for hour, state in hourly.items():
        center = (state[\"west_arcsec\"], state[\"north_arcsec\"])
"""
          assert text.count(old_loop) == 1
          text = text.replace(old_loop, new_loop)

          old_hour_offset = "        offset_y = 42.0 if hour <= 8 else -42.0"
          new_hour_offset = "        offset_y = hourly_label_offsets[hour]"
          assert text.count(old_hour_offset) == 1
          text = text.replace(old_hour_offset, new_hour_offset)

          old_offsets = """    label_offsets = {
        \"C1\": (-70.0, 45.0),
        \"C2\": (-60.0, 52.0),
        \"MAX\": (65.0, -28.0),
        \"C3\": (60.0, -50.0),
        \"C4\": (70.0, -42.0),
    }
"""
          new_offsets = """    label_offsets = {
        \"C1\": (18.0, 122.0),
        \"C2\": (68.0, 66.0),
        \"MAX\": (58.0, 122.0),
        \"C3\": (-62.0, 86.0),
        \"C4\": (48.0, 112.0),
    }
"""
          assert text.count(old_offsets) == 1
          text = text.replace(old_offsets, new_offsets)

          old_alignment = """            ha=\"center\",
            va=\"center\",
            arrowprops={
                \"arrowstyle\": \"-\",
                \"linewidth\": 0.22,
                \"color\": event_colors[key],
            },
"""
          new_alignment = """            ha=\"right\" if dx < 0.0 else \"left\",
            va=\"bottom\" if dy > 0.0 else \"top\",
            bbox={
                \"boxstyle\": \"round,pad=0.18\",
                \"facecolor\": \"#03080d\",
                \"edgecolor\": \"none\",
                \"alpha\": 0.92,
            },
            arrowprops={
                \"arrowstyle\": \"-\",
                \"linewidth\": 0.22,
                \"color\": event_colors[key],
                \"shrinkA\": 2.0,
                \"shrinkB\": 4.0,
            },
"""
          assert text.count(old_alignment) == 1
          text = text.replace(old_alignment, new_alignment)

          old_comment = '    print("No AI image generation is used.")'
          new_comment = '''    print("Contact and greatest-transit labels use separated up/down offsets with leader lines and dark backing boxes.")
    print("Hourly labels alternate above and below the track to avoid contact-label collisions.")
    print("No AI image generation is used.")'''
          assert text.count(old_comment) == 1
          text = text.replace(old_comment, new_comment)

          target.write_text(text, encoding="utf-8")
          py_compile.compile(str(target), doraise=True)

          audit_terms = {
              "TODO": "TODO",
              "placeholder": "placeholder",
              "pass statement": "\n    pass\n",
          }
          lowered = text.lower()
          assert "todo" not in lowered
          assert "placeholder" not in lowered
          assert "\n    pass\n" not in text
          assert text.splitlines()[0] == "# IERS-0012U"
          assert text.splitlines()[-1] == "# IERS-0012U"
          print(f"Created {target} with {len(text.splitlines())} lines; compile check PASS")
          PYCODE

      - name: Commit assembled source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add IERS_0012U_JPL_2004_NASA_FIGURE2_RECONSTRUCTION_LABEL_LAYOUT.py
          if git diff --cached --quiet; then
            echo "No source change to commit."
            exit 0
          fi
          git commit -m "Add IERS 0012U separated plot label layout"
          git push
