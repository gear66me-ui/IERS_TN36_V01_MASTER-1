name: Assemble IERS 0012P

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/assemble_iers_0012p.yml

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reconstruct and compile-check IERS 0012P
        shell: bash
        run: |
          python - <<'PYCODE'
          import base64
          import gzip
          import pathlib
          import py_compile

          payload = """"""
          output = pathlib.Path("IERS_0012P_ROTATED_ANTIPODAL_MAX_PROJECTION_ENGINEERING_TRACK_PLOT_PI_SUN.py")
          output.write_bytes(gzip.decompress(base64.b64decode(payload)))
          py_compile.compile(str(output), doraise=True)
          print(f"Created {output} with {len(output.read_text(encoding='utf-8').splitlines())} lines")
          PYCODE

      - name: Commit assembled source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add IERS_0012P_ROTATED_ANTIPODAL_MAX_PROJECTION_ENGINEERING_TRACK_PLOT_PI_SUN.py
          if git diff --cached --quiet; then
            echo "No source change to commit."
            exit 0
          fi
          git commit -m "Add IERS 0012P rotated antipodal projection"
          git push
